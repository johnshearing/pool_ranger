<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Pool Ranger — Staking Address Tool</title>
  <style>
    body { font-family: monospace; max-width: 720px; margin: 40px auto; padding: 0 20px; }
    h2 { margin-bottom: 4px; }
    p  { margin-top: 4px; color: #555; }
    label { display: block; font-weight: bold; margin: 16px 0 4px; }
    textarea { width: 100%; height: 80px; font-size: 12px; box-sizing: border-box; }
    input[type=number] { width: 200px; font-size: 14px; padding: 4px 6px; }
    button { padding: 10px 22px; font-size: 15px; cursor: pointer; margin-right: 8px; margin-top: 16px; }
    #status { margin-top: 14px; font-size: 14px; min-height: 1.4em; white-space: pre-wrap; }
    #result { margin-top: 14px; font-size: 14px; }
    #result a { color: #0066cc; }
    .hint { color: #777; font-size: 12px; margin-top: 2px; font-weight: normal; }
    #mode-toggle { margin: 12px 0 8px; padding: 10px 14px; background: #f5f5f5; border-radius: 4px; }
    #mode-toggle label { display: inline; font-weight: normal; margin-right: 18px; cursor: pointer; }
    #mode-toggle input[type=radio] { margin-right: 6px; }
  </style>
  <script type="module" crossorigin src="/assets/send_from_staking-BOGPYP5f.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/modulepreload-polyfill-B5Qt9EMX.js">
</head>
<body>
  <h2>Pool Ranger — Staking Address Tool</h2>

  <div id="mode-toggle">
    <label><input type="radio" name="mode" value="spend" checked /> Spend FROM staking address</label>
    <label><input type="radio" name="mode" value="sweep" /> Sweep INTO staking address</label>
  </div>

  <p id="mode-description">Spend ADA from your Pool Ranger staking address. The change goes back to the same address so the rest of your ADA stays delegated through the cooperative.</p>

  <label for="staking-addr">1. Your Pool Ranger staking address
    <div class="hint">Paste from the report your admin sent you. Starts with <code>addr_test1y</code> on testnet or <code>addr1y</code> on mainnet.</div>
  </label>
  <textarea id="staking-addr" placeholder="addr_test1y..."></textarea>
  <div id="prefill-note" class="hint"></div>

  <div id="recipient-group">
    <label for="recipient">2. Recipient address
      <div class="hint">Where the ADA should go. Any normal Cardano address.</div>
    </label>
    <textarea id="recipient" placeholder="addr_test1q..."></textarea>
  </div>

  <div id="amount-group">
    <label for="amount">3. Amount (tADA)
      <div class="hint">For example, type 5 to send 5 tADA. Decimals allowed (e.g. 5.25). Leave at least ~1 tADA at the staking address.</div>
    </label>
    <input id="amount" type="number" min="0" step="0.000001" />
  </div>

  <div>
    <button id="btn-send">Sign and submit with Eternl (Ledger)</button>
  </div>

  <div id="status"></div>
  <div id="result"></div>

</body>
</html>
