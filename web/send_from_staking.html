<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Pool Ranger — Send from Staking Address</title>
  <style>
    body { font-family: monospace; max-width: 720px; margin: 40px auto; padding: 0 20px; }
    h2 { margin-bottom: 4px; }
    p  { margin-top: 4px; color: #555; }
    label { display: block; font-weight: bold; margin: 16px 0 4px; }
    textarea { width: 100%; height: 80px; font-size: 12px; box-sizing: border-box; }
    input[type=number] { width: 200px; font-size: 14px; padding: 4px 6px; }
    button { padding: 10px 22px; font-size: 15px; cursor: pointer; margin-right: 8px; margin-top: 16px; }
    #status { margin-top: 14px; font-size: 14px; min-height: 1.4em; white-space: pre-wrap; }
    #result { margin-top: 14px; font-size: 14px; }
    #result a { color: #0066cc; }
    .hint { color: #777; font-size: 12px; margin-top: 2px; font-weight: normal; }
  </style>
</head>
<body>
  <h2>Pool Ranger — Send from Staking Address</h2>
  <p>Spend ADA from your Pool Ranger staking address. The change goes back to the same address so the rest of your ADA stays delegated through the cooperative.</p>

  <label for="staking-addr">1. Your Pool Ranger staking address
    <div class="hint">Paste from the report your admin sent you. Starts with <code>addr_test1y</code> on testnet or <code>addr1y</code> on mainnet.</div>
  </label>
  <textarea id="staking-addr" placeholder="addr_test1y..."></textarea>
  <div id="prefill-note" class="hint"></div>

  <label for="recipient">2. Recipient address
    <div class="hint">Where the ADA should go. Any normal Cardano address.</div>
  </label>
  <textarea id="recipient" placeholder="addr_test1q..."></textarea>

  <label for="amount">3. Amount (tADA)
    <div class="hint">Decimal allowed (e.g. 5.25). Leave at least ~1 tADA at the staking address.</div>
  </label>
  <input id="amount" type="number" min="0" step="0.000001" placeholder="5" />

  <div>
    <button id="btn-send">Sign and submit with Eternl (Ledger)</button>
  </div>

  <div id="status"></div>
  <div id="result"></div>

  <script type="module" src="./send_from_staking.js"></script>
</body>
</html>
